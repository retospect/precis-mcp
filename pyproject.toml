[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "precis-mcp"
version = "3.2.0"
description = "MCP server for structured document access — read, write, search, and annotate DOCX, LaTeX, Markdown, and scientific papers with minimal token usage"
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
authors = [{ name = "Reto Stamm", email = "reto@retostamm.com" }]
keywords = [
    "mcp",
    "mcp-server",
    "model-context-protocol",
    "llm",
    "ai-agent",
    "context-management",
    "token-optimization",
    "document",
    "docx",
    "latex",
    "markdown",
    "pdf",
    "scientific-papers",
    "track-changes",
    "semantic-search",
    "claude",
    "cursor",
    "windsurf",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Text Processing :: Markup",
    "Topic :: Text Processing :: Markup :: LaTeX",
    "Topic :: Text Processing :: Markup :: Markdown",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "mcp[cli]>=1.0",
    "precis-summary>=0.1.0",
    "platformdirs>=4.0",
    "python-docx>=1.1",
    "lxml>=5.0",
    "acatome-store[embeddings]>=0.1.0",
    "acatome-meta>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/retospect/precis-mcp"
Repository = "https://github.com/retospect/precis-mcp"

[project.optional-dependencies]
word = ["python-docx>=1.1", "lxml>=5.0"]
tex = ["lxml>=5.0"]
paper = ["acatome-store[embeddings]>=0.1.0", "acatome-meta>=0.1.0"]
flashcards = ["acatome-store>=0.1.0"]
all = ["precis-mcp[word,tex,paper,flashcards]"]

[project.scripts]
precis = "precis.server:main"

[project.entry-points."precis.file_types"]
".docx" = "precis.handlers.word:WordHandler"
".tex" = "precis.handlers.tex:TexHandler"
".md" = "precis.handlers.markdown:MarkdownHandler"
".markdown" = "precis.handlers.markdown:MarkdownHandler"
".txt" = "precis.handlers.plaintext:PlainTextHandler"
".text" = "precis.handlers.plaintext:PlainTextHandler"

[project.entry-points."precis.schemes"]
paper = "precis.handlers.paper:PaperHandler"
todo = "precis.handlers.todo:TodoHandler"
fc = "precis.handlers.flashcard:FlashcardHandler"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
    "mypy>=1.15",
    "pre-commit>=4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/precis"]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "B008",    # function-call-in-default-argument (typer pattern)
    "B904",    # raise-without-from-inside-except
    "E501",    # line-too-long (formatter handles what it can)
    "E741",    # ambiguous-variable-name
    "RUF001",  # ambiguous-unicode-character-string
    "RUF002",  # ambiguous-unicode-character-docstring
    "RUF003",  # ambiguous-unicode-character-comment
    "RUF012",  # mutable-class-default (SQLAlchemy/Pydantic models)
    "SIM102",  # collapsible-if
    "SIM103",  # needless-bool
    "SIM105",  # suppressible-exception
    "SIM108",  # if-else-block-instead-of-if-exp
    "SIM110",  # reimplemented-builtin
    "SIM117",  # multiple-with-statements
    "B007",    # unused-loop-control-variable
    "B905",    # zip-without-explicit-strict
    "RUF005",  # collection-literal-concatenation
    "RUF006",  # asyncio-dangling-task
    "RUF013",  # implicit-optional
    "RUF043",  # match-metacharacter-unescaped
    "UP036",   # outdated-version-block
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B007", "E402", "E731", "E741", "F841", "RUF012", "RUF015", "RUF059", "UP036"]
"src/**" = ["E402", "F841", "RUF059"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
check_untyped_defs = true
ignore_missing_imports = true
disable_error_code = [
    "arg-type",
    "assignment",
    "attr-defined",
    "call-arg",
    "dict-item",
    "index",
    "method-assign",
    "no-any-return",
    "operator",
    "type-var",
    "union-attr",
    "valid-type",
    "var-annotated",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
