[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "precis-mcp"
version = "0.1.0"
description = "MCP server for compressed structured context on .docx and .tex documents"
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
keywords = ["mcp", "docx", "latex", "llm", "document", "precis", "keyword-extraction"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: Markup",
]

[project.urls]
Homepage = "https://github.com/acatome/precis-mcp"
Repository = "https://github.com/acatome/precis-mcp"
Issues = "https://github.com/acatome/precis-mcp/issues"

dependencies = [
    "mcp[cli]>=1.0",
    "python-docx>=1.1",
    "lxml>=5.0",
    "platformdirs>=4.0",
    "tomli>=2.0; python_version < '3.11'",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "black>=24.0",
    "ruff>=0.5",
]

[project.scripts]
precis = "precis.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/precis"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88
