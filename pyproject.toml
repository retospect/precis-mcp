[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "precis-mcp"
version = "5.2.6"
description = "MCP server for structured document access — read, write, search, and annotate DOCX, LaTeX, Markdown, and scientific papers with minimal token usage"
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
authors = [{ name = "Reto Stamm", email = "reto@retostamm.com" }]
keywords = [
    "mcp",
    "mcp-server",
    "model-context-protocol",
    "llm",
    "ai-agent",
    "context-management",
    "token-optimization",
    "document",
    "docx",
    "latex",
    "markdown",
    "pdf",
    "scientific-papers",
    "track-changes",
    "semantic-search",
    "claude",
    "cursor",
    "windsurf",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Text Processing :: Markup",
    "Topic :: Text Processing :: Markup :: LaTeX",
    "Topic :: Text Processing :: Markup :: Markdown",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "mcp[cli]>=1.0",
    "precis-summary>=0.1.0",
    "platformdirs>=4.0",
    "python-docx>=1.1",
    "lxml>=5.0",
    "acatome-store[embeddings]>=1.0.0",
    "acatome-meta>=0.1.0",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/retospect/precis-mcp"
Repository = "https://github.com/retospect/precis-mcp"

[project.optional-dependencies]
docx = ["python-docx>=1.1", "lxml>=5.0"]
tex = ["lxml>=5.0"]
paper = ["acatome-store[embeddings]>=1.0.0", "acatome-meta>=0.1.0"]
flashcards = ["acatome-store>=1.0.0"]
# Phase 12a: quest kind (paper-request lifecycle).  Pulls in the runner
# package for its DB + models; precis only uses the read path in 12a.
# The runner itself is renamed to ``acatome-quest-runner`` in Phase 12c
# — the dep name will follow.
quest = ["acatome-quest-mcp>=0.1.0"]
# Phase 4 external stateless handlers.  Each handler is ImportError-gated
# so the core install stays lean; install ``[external]`` to enable all of
# them, or pin individual deps.  Handlers with ``requires`` env vars
# (e.g. ``WOLFRAM_APP_ID``) also auto-hide from the tool enum when the
# env is unset (§6.2 / §13).
external = [
    "wolframalpha>=5.0",
    "youtube-transcript-api>=1.0",
    "httpx>=0.27",
]
# Phase 5: local calculator (free, offline).  SymPy handles arithmetic,
# exact fractions, roots, calculus, linear algebra, symbolic manipulation,
# and unit conversion.  Separate extra because it's ~30 MB on disk.
calc = ["sympy>=1.12"]
# Phase 5b: declarative matplotlib plot renderer (free, offline).  Post a
# JSON spec, get a PNG/SVG/WebP/PDF back.  Separate extra because
# matplotlib pulls in ~70 MB of wheels (numpy, pillow, fonts).
plot = ["matplotlib>=3.7", "pydantic>=2.0"]
# Phase 5c: reMarkable tablet push (write-only cloud upload).  The
# handler wraps ``remarkable-mcp`` for its cloud-sync client, but that
# package is not on PyPI (installed from git in the cluster ansible
# role), and PyPI rejects git-URL deps on upload.  The extra is kept
# declared-but-empty so ``pip install precis-mcp[remarkable]`` is a
# valid no-op; the user (or the cluster provisioning role) is
# responsible for installing ``remarkable-mcp`` separately.  The
# handler auto-hides the ``rmk`` kind when the package is missing or
# ``REMARKABLE_TOKEN`` is not set.
remarkable = []
all = ["precis-mcp[docx,tex,paper,flashcards,quest,external,calc,plot]"]

[project.scripts]
precis = "precis.server:main"
precis-ingest-oracle = "precis.handlers.oracle_ingest:_cli_main"

[project.entry-points."precis.file_types"]
".docx" = "precis.handlers.docx:DocxHandler"
".tex" = "precis.handlers.tex:TexHandler"
".md" = "precis.handlers.markdown:MarkdownHandler"
".markdown" = "precis.handlers.markdown:MarkdownHandler"
".txt" = "precis.handlers.plaintext:PlainTextHandler"
".text" = "precis.handlers.plaintext:PlainTextHandler"

[project.entry-points."precis.schemes"]
paper = "precis.handlers.paper:PaperHandler"
todo = "precis.handlers.todo:TodoHandler"
# ``fc`` was retired 2026-04-22 — canonical scheme is ``flashcard``.
# Do NOT re-add: the legacy entry-point loader registers scheme keys
# that aren't already claimed by a built-in plugin, so ``fc`` here
# would leak into SCHEMES as an orphan (BUG-B regression).
flashcard = "precis.handlers.flashcard:FlashcardHandler"
skill = "precis.handlers.skill:SkillHandler"
quest = "precis.handlers.quest:QuestHandler"
plot = "precis.handlers.plot:PlotHandler"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
    "mypy>=1.15",
    "pre-commit>=4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/precis"]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "B008",    # function-call-in-default-argument (typer pattern)
    "B904",    # raise-without-from-inside-except
    "E501",    # line-too-long (formatter handles what it can)
    "E741",    # ambiguous-variable-name
    "RUF001",  # ambiguous-unicode-character-string
    "RUF002",  # ambiguous-unicode-character-docstring
    "RUF003",  # ambiguous-unicode-character-comment
    "RUF012",  # mutable-class-default (SQLAlchemy/Pydantic models)
    "SIM102",  # collapsible-if
    "SIM103",  # needless-bool
    "SIM105",  # suppressible-exception
    "SIM108",  # if-else-block-instead-of-if-exp
    "SIM110",  # reimplemented-builtin
    "SIM117",  # multiple-with-statements
    "B007",    # unused-loop-control-variable
    "B905",    # zip-without-explicit-strict
    "RUF005",  # collection-literal-concatenation
    "RUF006",  # asyncio-dangling-task
    "RUF013",  # implicit-optional
    "RUF043",  # match-metacharacter-unescaped
    "UP036",   # outdated-version-block
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B007", "E402", "E731", "E741", "F841", "RUF012", "RUF015", "RUF059", "UP036"]
"src/**" = ["E402", "F841", "RUF059"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
check_untyped_defs = true
ignore_missing_imports = true
disable_error_code = [
    "arg-type",
    "assignment",
    "attr-defined",
    "call-arg",
    "dict-item",
    "index",
    "method-assign",
    "no-any-return",
    "operator",
    "type-var",
    "union-attr",
    "valid-type",
    "var-annotated",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
