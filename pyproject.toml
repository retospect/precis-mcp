[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "precis-mcp"
version = "3.0.0"
description = "Unified document MCP — read, write, search, annotate any structured document"
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
authors = [{ name = "Reto Stamm", email = "reto@retostamm.com" }]
keywords = ["mcp", "docx", "latex", "markdown", "pdf", "llm", "document", "precis"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Topic :: Text Processing :: Markup",
]

dependencies = [
    "mcp[cli]>=1.0",
    "precis-summary>=0.1.0",
    "platformdirs>=4.0",
]

[project.urls]
Homepage = "https://github.com/retospect/precis-mcp"
Repository = "https://github.com/retospect/precis-mcp"

[project.optional-dependencies]
word = ["python-docx>=1.1", "lxml>=5.0"]
tex = ["lxml>=5.0"]
paper = ["acatome-store[embeddings]>=0.1.0"]
all = ["precis-mcp[word,tex,paper]"]

[project.scripts]
precis = "precis.server:main"

[project.entry-points."precis.file_types"]
".docx" = "precis.handlers.word:WordHandler"
".tex" = "precis.handlers.tex:TexHandler"
".md" = "precis.handlers.markdown:MarkdownHandler"
".markdown" = "precis.handlers.markdown:MarkdownHandler"
".txt" = "precis.handlers.plaintext:PlainTextHandler"
".text" = "precis.handlers.plaintext:PlainTextHandler"

[project.entry-points."precis.schemes"]
paper = "precis.handlers.paper:PaperHandler"
todo = "precis.handlers.todo:TodoHandler"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
    "mypy>=1.15",
    "pre-commit>=4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/precis"]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
