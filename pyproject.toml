[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "precis-mcp"
version = "6.0.0a0"
description = "MCP server giving LLM agents a seven-verb API over papers, documents, code, personal state, patents, and cached web/Wolfram/YouTube tool calls — backed by PostgreSQL + pgvector"
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
authors = [{ name = "Reto Stamm", email = "reto@retostamm.com" }]
keywords = [
    "mcp",
    "mcp-server",
    "model-context-protocol",
    "llm",
    "ai-agent",
    "agent-tools",
    "context-management",
    "token-optimization",
    "progressive-disclosure",
    "scientific-papers",
    "pdf",
    "markdown",
    "latex",
    "docx",
    "python",
    "code-navigation",
    "ast",
    "callgraph",
    "semantic-search",
    "pgvector",
    "postgres",
    "patents",
    "wolfram-alpha",
    "perplexity",
    "youtube-transcripts",
    "spaced-repetition",
    "claude",
    "cursor",
    "windsurf",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Text Processing :: Markup",
    "Topic :: Text Processing :: Markup :: LaTeX",
    "Topic :: Text Processing :: Markup :: Markdown",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "mcp[cli]>=1.0",
    "psycopg[binary,pool]>=3.2",
    "pgvector>=0.3.0",
    "pydantic-settings>=2.0",
    "platformdirs>=4.0",
    "pyyaml>=6.0",
    # Defense-in-depth mojibake repair on bundle ingest. acatome-extract
    # >= 0.6.2 already runs this on the source side (chemistry-safe
    # config; see ``acatome_extract.marker._FTFY_CONFIG``), but bundles
    # produced by older versions still arrive in some users' caches —
    # we re-run a matching config here so what's stored in the DB is
    # always clean regardless of which extractor produced the bundle.
    "ftfy>=6.3",
]

[project.urls]
Homepage = "https://github.com/retospect/precis-mcp"
Repository = "https://github.com/retospect/precis-mcp"

[project.optional-dependencies]
# Paper ingest — depends on acatome-extract for PDF → .acatome bundle
# and sentence-transformers for the bge-m3 embedder used at search
# time. Without sentence-transformers the search() verb on every
# embedder-backed kind crashes with -32603 even though tools/list
# advertises it as supported. (MCP critic CRITICAL — search(kind=
# 'paper', …) is broken in this deployment.) The hint surfaced by
# `BgeM3Embedder._ensure_loaded` says `pip install 'precis-mcp
# [paper]'`, so this extra has to actually carry the dep.
paper = [
    "acatome-extract[embeddings]>=0.1",
    "sentence-transformers>=3.0",
]
# DOCX file handler.
docx = ["python-docx>=1.1", "lxml>=5.0"]
# LaTeX file handler.
tex = ["lxml>=5.0"]
# Local calculator (sympy).
calc = ["sympy>=1.12"]
# Declarative matplotlib plot renderer.
plot = ["matplotlib>=3.7", "pydantic>=2.0"]
# Paid web tools (perplexity / wolfram / youtube transcripts).
external = [
    "wolframalpha>=5.0",
    "youtube-transcript-api>=1.0",
    "httpx>=0.27",
    "trafilatura>=1.6",  # web page → markdown extractor
]
# Patent kind — EPO Open Patent Services. Free fair-use, OAuth2.
patent = [
    "python-epo-ops-client>=4.0",
    "lxml>=5.0",
]
all = ["precis-mcp[paper,docx,tex,calc,plot,external,patent]"]

[project.scripts]
precis = "precis.cli:main"

# V2 drops entry-point handler discovery in favour of an in-tree
# `BUILTINS` registry list. No `precis.file_types` / `precis.schemes`
# groups.

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.11",
    "mypy>=1.15",
    "pre-commit>=4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/precis"]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "B008",    # function-call-in-default-argument (typer pattern)
    "E501",    # line-too-long (formatter handles what it can)
    "E741",    # ambiguous-variable-name
    "RUF001",  # ambiguous-unicode-character-string
    "RUF002",  # ambiguous-unicode-character-docstring
    "RUF003",  # ambiguous-unicode-character-comment
    "RUF012",  # mutable-class-default (SQLAlchemy/Pydantic models)
    "SIM102",  # collapsible-if
    "SIM103",  # needless-bool
    "SIM105",  # suppressible-exception
    "SIM108",  # if-else-block-instead-of-if-exp
    "SIM110",  # reimplemented-builtin
    "SIM117",  # multiple-with-statements
    "B007",    # unused-loop-control-variable
    "B905",    # zip-without-explicit-strict
    "RUF005",  # collection-literal-concatenation
    "RUF006",  # asyncio-dangling-task
    "RUF013",  # implicit-optional
    "RUF043",  # match-metacharacter-unescaped
    "UP036",   # outdated-version-block
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B007", "E402", "E731", "E741", "F841", "RUF012", "RUF015", "RUF059", "UP036"]
"src/**" = ["E402", "F841", "RUF059"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
check_untyped_defs = true
ignore_missing_imports = true
disable_error_code = [
    "assignment",
    "dict-item",
    "index",
    "method-assign",
    "no-any-return",
    "operator",
    "type-var",
    "union-attr",
    "valid-type",
    "var-annotated",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
