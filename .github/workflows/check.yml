name: check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '6 4 3 * *'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src tests

  # Linux legs run the FULL suite against a real PostgreSQL + pgvector,
  # so the db-tagged tests (~41% of the suite) actually gate the release
  # instead of auto-skipping. GHA service containers are Linux-only,
  # hence the split from `test-other`.
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    services:
      postgres:
        # pgvector image so the `vector` extension is present; the
        # migration bootstrap CREATE EXTENSIONs it (plus pg_trgm,
        # btree_gist) on first apply. Pinned to pg17 to match the dev /
        # prod server major: the baseline snapshot is dumped by a pg17
        # pg_dump and emits `SET transaction_timeout = 0` (a pg17-only
        # GUC), which pg16 rejects with "unrecognized configuration
        # parameter".
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: precis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # The runner image ships pg_dump 16, but the service is pg17 and
      # pg_dump refuses to dump a server newer than itself (aborting
      # `test_schema_convergence`). Install the matching pg17 client from
      # the PGDG repo and put it ahead on PATH so `pg_dump` resolves to
      # v17. The repo used to come preconfigured on GitHub's Ubuntu
      # images, but the noble runners no longer ship it (apt then can't
      # locate postgresql-client-17), so add it explicitly via the
      # official signed-by keyring method.
      - name: Install PostgreSQL 17 client to match the pg17 server
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
      # Connect as the `postgres` superuser: the migration bootstrap
      # issues CREATE EXTENSION on the untrusted `vector` / `btree_gist`
      # extensions, which only a superuser may install. The conftest
      # session fixture drops + re-applies the schema, so an empty
      # `precis_test` database is all that's required here.
      - run: uv run --extra all pytest
        env:
          PRECIS_TEST_PG_URL: postgresql://postgres:postgres@localhost:5432/precis_test

  # macOS / Windows: no service-container support, so postgres is absent
  # and the db-tagged tests auto-skip via the conftest probe. These legs
  # cover the db-less suite + platform-specific paths.
  test-other:
    runs-on: ${{ matrix.platform }}
    # Tolerate failures on platforms that have known platform-specific
    # test bugs we haven't fixed yet.  Tracked in OPEN-ITEMS.md:
    #   * Windows: ``os.O_DIRECTORY`` is Unix-only; 27 file-handler tests
    #     fail with AttributeError.
    #   * macOS + framework Python 3.12: the runtrace runner subprocess
    #     hits a urllib circular-import; 5 tests fail.  3.11 + 3.13 are fine.
    # The job still runs and reports per-test status — it just doesn't
    # gate the workflow (and therefore doesn't block tag-driven publish).
    continue-on-error: >-
      ${{ matrix.platform == 'windows-latest'
          || (matrix.platform == 'macos-latest' && matrix.python-version == '3.12') }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv run --extra all pytest

  publish:
    needs: [lint, test-linux, test-other]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      # Release gate: the committed baseline snapshot must bake in every
      # migration, so a fresh install of this tagged version applies
      # schema.sql with zero tail. Regenerate with `scripts/bump` (which
      # runs `precis db dump-schema`) if this fails. See ADR 0031.
      - run: uv run python -c "from precis.store.schema_dump import assert_baseline_at_head as a; a()"
      - run: uv build
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
