name: Publish to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - run: uv build
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: dist/*
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true

  publish-image:
    # Run after the PyPI publish succeeds so a failed sdist build never
    # races a half-published image into GHCR.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Action versions intentionally use major tags here so dependabot
      # (configured in .github/dependabot.yml + the auto-merge workflow)
      # can keep them current. The publish job above pins by SHA — once
      # this job lands and dependabot opens its first PR against it, the
      # auto-merge flow will rewrite these to SHAs.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from the git tag that triggered the workflow:
      #   v7.1.0 → ghcr.io/<owner>/precis-mcp:{7.1.0, 7.1, latest}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/precis-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Build the runtime stage only — the dev stage is for the in-repo
      # precis-dev container, not for downstream consumers. The Dockerfile
      # is multi-stage (builder → models → runtime → dev); see
      # docs/decisions/0004-multi-stage-dockerfile.md and
      # docs/design/bake-models-into-image.md.
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/precis-mcp
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
