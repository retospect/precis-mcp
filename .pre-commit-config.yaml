repos:
  # Keep `rev` in sync with the ruff version pinned in `uv.lock`
  # (run `grep -A1 '^name = "ruff"' uv.lock`) so pre-commit and CI's
  # `uv run ruff` agree on which formatter rules to apply. A mismatch
  # silently passes locally and fails in CI's `ruff format --check`.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
