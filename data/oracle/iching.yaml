slug: iching
title: I-Ching
description: The Book of Changes.  64 archetypes for re-framing situations, each
  with three layers (heritage Yi-Jing / modern systems / cognitive lens).  Use as
  a re-framing prompt, not divination.
tags:
- i-ching
- divination
entries:
- title: Hexagram  1 · 乾 Creative Force
  body: '**Heritage**

    Initiate boldly; act with clarity and purpose.

    _Pure generative energy. Direction matters more than effort._


    **Modern (systems): Execution Mode**

    Act decisively when signal is strong.

    _High-confidence environments favour action over analysis._


    **Cognitive lens (heuristic): Action Bias**

    Act to generate information.

    _Execution produces feedback faster than planning._

    '
  extra_section_path:
  - 'Cognitive: Action Bias (heuristic)'
  original: 乾
  lang: zh
  source: I-Ching, unified three-layer system
  trigrams: Heaven over Heaven
  binary: '111111'
- title: Hexagram  2 · 坤 Receptive Ground
  body: '**Heritage**

    Support and adapt.

    _Stability emerges through receptivity._


    **Modern (systems): Observation Mode**

    Delay action to gather signal.

    _Low-information states benefit from patience._


    **Cognitive lens (heuristic): Bayesian Updating**

    Update beliefs with evidence.

    _Wait for signal before committing._

    '
  extra_section_path:
  - 'Cognitive: Bayesian Updating (heuristic)'
  original: 坤
  lang: zh
  source: I-Ching, unified three-layer system
  trigrams: Earth over Earth
  binary: '000000'
- title: Hexagram  3 · 屯 Initial Difficulty
  body: '**Heritage**

