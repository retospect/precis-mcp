slug: proverbs-euro
title: European Proverbs
description: European proverbs.  English and continental folk-wisdom — compounding,
  prevention, signal-from-failure, and the cost of premature optimisation by another
  name.
tags:
- proverbs
entries:
- title: A stitch in time saves nine
  body: Small interventions early prevent disproportionate work later. The cost
    curve of fixing things is steep — what's a stitch now is a re-tailoring next
    week.  When you spot the early thread, pull it.
  lang: en
- title: Rome wasn't built in a day
  body: Substantial things compound from many small contributions over time.  Plans
    that require everything to happen at once mostly don't ship.  Plan for steady
    accretion, not heroic sprints — the latter only finish the last 10%.
  lang: en
- title: Every cloud has a silver lining
  body: Negative outcomes contain information that positive outcomes hide.  When
    something fails, ask what it now lets you know that you didn't before.  The
    cost of the lesson is the price of the cloud; the lesson is the silver.
  lang: en
- title: Actions speak louder than words
  body: What people do reveals what they actually believe.  Stated values and lived
    values often diverge — and when they do, the lived ones win.  Calibrate your
    read of others (and of yourself) on the actions, not the press release.
  lang: en
- title: Don't judge a book by its cover
  body: First impressions are noisy.  Slow your judgement when the cost of being
    wrong is high — interview, sample, ask a second question.  When the cost is
    low, snap judgement is fine; budget your scrutiny by stakes.
  lang: en
- title: Necessity is the mother of invention
  body: Constraints generate ideas that abundance suppresses.  When you have unlimited
    time, money, or computing, the obvious solution wins by default; when you don't,
    you find the better one.  Self-impose constraints when stuck.
  lang: en
