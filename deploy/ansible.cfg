[defaults]
inventory = inventory/hosts.yml
roles_path = roles
collections_paths = collections
remote_user = deploy
private_key_file = ~/.ssh/cluster
vault_password_file = .vault-pass
host_key_checking = False
retry_files_enabled = False
remote_tmp = /tmp/.ansible/tmp
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600
stdout_callback = ansible.builtin.default
result_format = yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root

[ssh_connection]
pipelining = True
# IdentityAgent=none + IdentitiesOnly=yes force ansible to authenticate with
# the passwordless private_key_file above (~/.ssh/cluster) ONLY, ignoring the
# user's ~/.ssh/config `Host *` IdentityAgent (1Password). Without this, ssh
# routes signing through the 1Password agent and every deploy fails with
# "agent refused operation" whenever 1Password is locked.
ssh_args = -o IdentityAgent=none -o IdentitiesOnly=yes -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
