---
# populate-secrets-vault.yml — write the real secret values from ansible-vault
# into the precis_prod DB secrets vault (precis ADR 0055 / migration 0059).
#
# One-off / idempotent migration. Values come from inventory/group_vars/all/
# vault.yml (never printed — no_log). Uses vault.set_secret (encrypts with the
# server-side app.secret_key). Names are the exact env-var names the precis code
# reads via secrets.get_secret, so env-override-wins keeps behaviour identical
# until the env vars are later pulled (phase D, separate).
#
#   ansible-playbook playbooks/populate-secrets-vault.yml
#
# Safe to re-run: set_secret upserts. Empty vault vars are skipped (set_secret
# rejects empty values). Only confident 1:1 mappings are included; Elsevier /
# Wiley / CORE / CLAUDE_CODE_OAUTH_TOKEN are intentionally omitted (not in
# vault.yml or file-bootstrapped).
- name: Populate the precis secrets vault
  hosts: data
  become: true
  become_user: deploy
  vars:
    ansible_python_interpreter: /opt/postgres-admin-venv/bin/python
    secret_map:
      - { name: PERPLEXITY_API_KEY, var: vault_perplexity_api_key }
      - { name: WOLFRAM_APP_ID, var: vault_wolfram_app_id }
      - { name: ANTHROPIC_API_KEY, var: vault_anthropic_api_key }
      - { name: SEMANTIC_SCHOLAR_API_KEY, var: vault_semantic_scholar_api_key }
      - { name: EPO_OPS_CLIENT_KEY, var: vault_epo_ops_client_key }
      - { name: EPO_OPS_CLIENT_SECRET, var: vault_epo_ops_client_secret }
      - { name: ORCID_CLIENT_ID, var: vault_orcid_client_id }
      - { name: ORCID_CLIENT_SECRET, var: vault_orcid_client_secret }
      - { name: PRECIS_OPENALEX_CONTENT_KEY, var: vault_openalex_content_key }
      - { name: PRECIS_ELSEVIER_API_KEY, var: vault_elsevier_api_key }
      - { name: PRECIS_WILEY_TDM_TOKEN, var: vault_wiley_tdm_token }
      - { name: PRECIS_CORE_API_KEY, var: vault_core_api_key }
      - { name: ASA_DISCORD_TOKEN, var: vault_discord_bot_token }
  tasks:
    - name: Write each secret into vault.secrets (skips empty values)
      community.postgresql.postgresql_query:
        db: precis_prod
        query: "SELECT vault.set_secret(%s, %s)"
        positional_args:
          - "{{ item.name }}"
          - "{{ lookup('vars', item.var, default='') }}"
        login_user: deploy
        login_unix_socket: /tmp
      loop: "{{ secret_map }}"
      loop_control:
        label: "{{ item.name }}"
      when: (lookup('vars', item.var, default='') | length) > 0
      no_log: true

    - name: Report vault inventory (masked)
      community.postgresql.postgresql_query:
        db: precis_prod
        query: "SELECT name, hint, updated_at FROM vault.list()"
        login_user: deploy
        login_unix_socket: /tmp
      register: vault_list

    - name: Show what's in the vault
      ansible.builtin.debug:
        msg: "{{ vault_list.query_result | map(attribute='name') | list }}"
