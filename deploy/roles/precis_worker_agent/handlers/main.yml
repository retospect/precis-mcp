---
# Persistent daemon: reload via the shared safe launchd task. Modern
# bootstrap was already correct here, but it had no retry for the
# transient `Load failed: 5` nor a post-restart pid assertion (gripe
# #48490) — the shared task adds both.
- name: restart precis-worker-agent
  ansible.builtin.include_tasks: "{{ role_path }}/../../tasks/reload_launchd.yml"
  vars:
    reload_unit: com.precis.worker-agent
    reload_persistent: true
  when: os_family == "darwin"

- name: restart precis-worker-agent (linux)
  ansible.builtin.systemd:
    name: precis-worker-agent
    state: restarted
    daemon_reload: true
  become: true
  when: os_family == "linux"

# Reload the colima autostart daemon on template change (slice 2B3). bootout
# then bootstrap so a changed plist takes effect; the RunAtLoad fire on
# bootstrap runs the check-and-start, so colima comes up if it was down.
- name: reload colima daemon
  ansible.builtin.shell: |
    launchctl bootout system/com.precis.colima 2>/dev/null || true
    launchctl bootstrap system /Library/LaunchDaemons/com.precis.colima.plist 2>/dev/null || true
  become: true
  when: os_family == "darwin"
