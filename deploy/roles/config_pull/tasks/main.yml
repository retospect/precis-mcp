---
# Nightly config pull: rsync /etc + /opt configs → /shared/backups/configs/<hostname>
# Runs on all nodes

- name: Deploy config-pull script
  ansible.builtin.template:
    src: config_pull.sh.j2
    dest: "{{ shared_mount }}/scripts/config_pull_{{ inventory_hostname }}.sh"
    mode: "0750"
  become: true

- name: Schedule nightly config pull
  ansible.builtin.cron:
    name: "nightly config pull to /shared"
    minute: "30"
    hour: "3"
    job: "{{ shared_mount }}/scripts/config_pull_{{ inventory_hostname }}.sh >> {{ shared_mount }}/logs/config-pull.log 2>&1"
  become: true
