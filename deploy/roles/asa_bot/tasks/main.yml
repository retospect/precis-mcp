---
# asa_bot — Discord bridge that runs Asa as a Claude Code agent on
# the gateway. Persists all state to precis (postgres on the data node) and
# delivers proactive sends + cron fires via pg LISTEN/NOTIFY.

- name: Ensure asa_bot system directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: staff
    mode: "{{ item.mode }}"
  become: true
  loop:
    - { path: "/opt/asa", owner: "deploy", mode: "0755" }
    - { path: "/opt/asa/hooks", owner: "deploy", mode: "0755" }
    - { path: "/Users/hermes/.asa", owner: "hermes", mode: "0750" }
    - { path: "/Users/hermes/.claude", owner: "hermes", mode: "0700" }
    - { path: "/Users/hermes/.claude/agents", owner: "hermes", mode: "0700" }
    - { path: "/Users/hermes/claudebot", owner: "hermes", mode: "0700" }
    - { path: "/Users/hermes/claudebot/attachments", owner: "hermes", mode: "0700" }
    # python kind dormant by default; dir exists so future repos can rsync in
    - { path: "/Users/hermes/claudebot/python", owner: "hermes", mode: "0700" }
    # patent kind raw-XML cache; precis writes here when downloading EPO docs
    - { path: "/Users/hermes/claudebot/patents-raw", owner: "hermes", mode: "0750" }

- name: Remove the pre-merge editable source tree (asa now installs from the wheel)
  ansible.builtin.file:
    path: /opt/asa/src
    state: absent
  become: true

- name: Detect /opt/asa/venv python mode (symlink-to-brew vs. copy)
  when: os_family == "darwin"
  ansible.builtin.shell: |
    set -u
    resolved=$(/usr/bin/readlink -f /opt/asa/venv/bin/python3 2>/dev/null || true)
    case "$resolved" in
      "")                      echo missing   ;;
      /opt/homebrew/*|/usr/*)  echo symlinked ;;
      /opt/asa/venv/*)         echo copied    ;;
      *)                       echo "other:$resolved" ;;
    esac
  register: asa_venv_mode
  changed_when: false
  become: true

- name: Wipe /opt/asa/venv if python is a copy
  when:
    - os_family == "darwin"
    - asa_venv_mode.stdout | default('') | trim == "copied"
  ansible.builtin.file:
    path: /opt/asa/venv
    state: absent
  become: true

- name: Create asa_bot venv (symlinked to brew python)
  when: os_family == "darwin"
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/python3 -m venv --symlinks /opt/asa/venv
    creates: /opt/asa/venv/bin/python3
  become: true

# asa-bot is folded into the precis-mcp monorepo (one wheel, many daemons —
# the precis_web pattern). We install it from git@main like the worker/web
# venvs instead of rsyncing the laptop tree; the `asa-bot` and `precis`
# entry points both ship in this wheel, so asa runs self-contained.
#
# One-time cutover: the pre-merge venv holds a standalone `asa-bot` editable
# dist that also provides the `asa_bot` import package. Leaving it installed
# alongside `precis-mcp` (which now vendors `asa_bot`) double-provides the
# package. Uninstall it first — idempotent no-op after the first cutover.
- name: Remove the pre-merge standalone asa-bot dist
  ansible.builtin.command:
    cmd: /opt/asa/venv/bin/pip uninstall -y asa-bot
  become: true
  register: asa_uninstall
  changed_when: "'Successfully uninstalled' in asa_uninstall.stdout"
  failed_when: false

- name: Install precis-mcp[asa] into asa venv
  ansible.builtin.shell: |
    /opt/homebrew/bin/uv pip install --python /opt/asa/venv/bin/python --upgrade \
      --refresh-package precis-mcp \
      'precis-mcp[asa] @ git+https://github.com/retospect/precis-mcp@{{ asa_git_ref | default("main") }}'
  become: true
  register: asa_pip
  # uv prints "Installed/Updated N package(s)" to STDERR — check both
  # streams so a code-only refresh still restarts the daemon.
  changed_when: >-
    'Installed' in (asa_pip.stdout + asa_pip.stderr)
    or 'Updated' in (asa_pip.stdout + asa_pip.stderr)
  notify: restart asa-bot

- name: Deploy SOUL.md
  ansible.builtin.copy:
    src: "{{ asa_bot_grimoire_dir }}/agents/asa.md"
    dest: /Users/hermes/.asa/SOUL.md
    owner: hermes
    group: staff
    mode: "0640"
  become: true
  notify: restart asa-bot

- name: Deploy TOOL_HINTS.md
  ansible.builtin.template:
    src: TOOL_HINTS.md.j2
    dest: /Users/hermes/.asa/TOOL_HINTS.md
    owner: hermes
    group: staff
    mode: "0640"
  become: true
  notify: restart asa-bot

- name: Deploy asa_bot config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /Users/hermes/.asa/config.yaml
    owner: hermes
    group: staff
    mode: "0640"
  become: true
  notify: restart asa-bot

- name: Deploy Stop-hook capture script
  ansible.builtin.copy:
    src: capture_assistant_turn.py
    dest: /opt/asa/hooks/capture_assistant_turn.py
    mode: "0755"
    owner: deploy
    group: staff
  become: true

- name: Deploy Claude Code settings.json (hooks config)
  ansible.builtin.template:
    src: claude_settings.json.j2
    dest: /Users/hermes/.claude/settings.json
    owner: hermes
    group: staff
    mode: "0600"
  become: true

- name: Deploy Claude Code mcp.json (server config)
  ansible.builtin.template:
    src: claude_mcp.json.j2
    dest: /Users/hermes/.claude/mcp.json
    owner: hermes
    group: staff
    mode: "0600"
  become: true
  notify: restart asa-bot

- name: Sync specialist subagent definitions
  # Drops every grimoire/agents/*.md (except asa.md, which is the
  # main SOUL, and mcp-critic.md which is a reviewer tool not a
  # runtime profile) into ~/.claude/agents/ with a YAML
  # frontmatter header prepended so Claude Code's Agent tool
  # registers it.
  ansible.builtin.copy:
    content: |
      ---
      name: {{ item | basename | regex_replace('\.md$', '') }}
      description: Specialist agent for {{ item | basename | regex_replace('\.md$', '') }} tasks (synced from grimoire/agents/).
      ---

      {{ lookup('file', item) }}
    dest: "/Users/hermes/.claude/agents/{{ item | basename }}"
    owner: hermes
    group: staff
    mode: "0600"
  with_fileglob:
    - "{{ asa_bot_grimoire_dir }}/agents/*.md"
  when: (item | basename) not in ['asa.md', 'mcp-critic.md']
  become: true

- name: Deploy LaunchDaemon
  when: os_family == "darwin"
  ansible.builtin.template:
    src: com.asa.bot.plist.j2
    dest: /Library/LaunchDaemons/com.asa.bot.plist
    mode: "0644"
    owner: root
    group: wheel
  become: true
  notify: restart asa-bot

- name: Ensure asa-bot log file is writable
  when: os_family == "darwin"
  ansible.builtin.file:
    path: /Users/hermes/.asa/asa-bot.log
    state: touch
    owner: hermes
    group: staff
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  become: true

- name: Load asa-bot LaunchDaemon
  when: os_family == "darwin"
  ansible.builtin.command: launchctl load -w /Library/LaunchDaemons/com.asa.bot.plist
  become: true
  changed_when: false
  failed_when: false

# ── Verification (fail red + self-heal a de-domain) ──
# Ansible handlers flush at play end, so a plain end-of-role task would
# check the STILL-RUNNING old process, not the post-restart daemon. Force
# the restart handler to run now, then verify the daemon that actually
# resulted.
- name: Flush handlers before verifying asa-bot
  when: os_family == "darwin"
  ansible.builtin.meta: flush_handlers

# The shared reload handler asserts a pid in its own immediate window, but
# a jetsam cull or transient bootout can de-domain com.asa.bot in the
# seconds AFTER that check — and once a job is booted out of the domain,
# KeepAlive can't bring it back (2026-07-13: the handler reported green,
# asa was gone moments later, every Discord turn silently dead). Settle,
# re-assert it is RUNNING, self-heal with one bootstrap if it got
# de-domained (the proven manual recovery), and fail LOUDLY if it never
# comes up so the host goes red instead of a green deploy masking a dead
# bot.
- name: Verify asa-bot is running (macOS)
  when: os_family == "darwin"
  ansible.builtin.shell: |
    set -u
    unit=com.asa.bot
    plist="/Library/LaunchDaemons/${unit}.plist"
    sleep 5
    for attempt in 1 2 3; do
      if launchctl print "system/${unit}" 2>/dev/null | grep -qE 'pid = [0-9]+'; then
        echo "${unit}: running (verify attempt ${attempt})"
        exit 0
      fi
      echo "${unit}: not running on verify ${attempt} — bootstrapping" >&2
      launchctl bootstrap system "${plist}" 2>/dev/null || true
      sleep 3
    done
    echo "${unit}: FAILED verification — not running after deploy" >&2
    exit 1
  become: true
  changed_when: false
