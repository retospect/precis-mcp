---
# precis watch-poll — launchd timer running `precis worker --only
# watch_poll --once` on the gateway. Citation-forward corpus growth: polls
# Semantic Scholar for papers that cite our most-due salient papers and
# mints metadata-only stubs (docs/design/watching.md). fetch_oa then
# OA-gates acquisition. Transient timer, deliberately NOT folded into
# the system-worker hot loop — it makes external S2 calls and must run
# on a cadence.
#
# Requires: the deployed precis package in {{ precis_watch_poll_venv }}
# to include the watch_poll pass (precis-mcp with docs/design/watching.md),
# and SEMANTIC_SCHOLAR_API_KEY in precis_shared_env.

- name: Ensure precis watch-poll LaunchDaemon plist
  when: os_family == "darwin"
  ansible.builtin.template:
    src: precis-watch-poll.plist.j2
    dest: /Library/LaunchDaemons/com.precis.watch-poll.plist
    mode: "0644"
    owner: root
    group: wheel
  become: true
  notify: restart precis-watch-poll

- name: Ensure precis-watch-poll log file is writable
  when: os_family == "darwin"
  ansible.builtin.file:
    path: /var/log/precis-watch-poll.log
    state: touch
    # Daemon runs as ``deploy`` (per the plist's UserName); the log must
    # be deploy-writable or launchd exits 78 (EX_CONFIG) before logging.
    # Same trap that bit precis_worker_agent / precis_cron_tick.
    mode: "0664"
    owner: deploy
    group: staff
    modification_time: preserve
    access_time: preserve
  become: true

- name: Load precis-watch-poll LaunchDaemon
  when: os_family == "darwin"
  # Modern bootstrap (idempotent-ish; failed_when false swallows the
  # "already loaded" race on a re-run). The handler reloads on change.
  ansible.builtin.command: >
    launchctl bootstrap system /Library/LaunchDaemons/com.precis.watch-poll.plist
  become: true
  changed_when: false
  failed_when: false
