id: dim
version: 1
question: "What is the geometric dimensionality of the system studied?"
values: ["0d", "1d", "2d", "3d", mixed, unknown, n-a]
default_unknown: unknown
applies_when:
  domain_in: [chemistry, physics, materials, eng]
prereq: [domain]
cost_tier: small
prompt: |
  Classify the geometric dimensionality of the system the paper
  studies — its topology, not its embedding space.

  Pick exactly ONE:

  - 0d     : quantum dots, fullerenes, nanoparticles, isolated molecules
  - 1d     : nanotubes, nanowires, chains, 1D channels
  - 2d     : graphene, MXenes, monolayers, sheets
  - 3d     : bulk crystals, MOFs, dense networks, foams
  - mixed  : deliberate hybrids (1D-on-2D, 0D-on-3D)
  - unknown: title + abstract genuinely ambiguous
  - n-a    : no geometric structure (method, pure theory, review)

  Return JSON:
  {"value": "<one>", "confidence": <0..1>,
   "rationale": "<one sentence; required if confidence < 0.7>"}

  A graphene/CNT composite is "mixed". A graphene paper that just
  measures graphene is "2d". Fullerene-doped polymer matrices are
  "mixed". Pure DFT methodology paper is "n-a".
