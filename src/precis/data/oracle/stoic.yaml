slug: stoic
title: Stoic
description: Stoic and classical aphorisms.  Marcus Aurelius, Epictetus, and the
  Latin tradition — pithy frames for control, finitude, and equanimity.
tags:
- stoic
entries:
- title: Amor fati — love what is
  body: Don't waste energy on the wish that the past, the situation, or the constraint
    were different.  It isn't.  Move from there. The opposite is rumination, which
    produces no signal and consumes attention.
  original: Amor fati.
  source: Marcus Aurelius / Nietzsche
  lang: la

- title: Memento mori — remember you will die
  body: The deadline is real but unspecified.  When weighing whether to ship, to
    confront, to apologise, ask whether you would do it if you knew today were the
    last day.  Most times the answer reorders priorities cleanly.
  original: Memento mori.
  source: Roman triumphal tradition
  lang: la

- title: The dichotomy of control
  body: Some things are within your control (your choices, your response, your effort)
    and some are not (other people, outcomes, timing).  Allocate worry only to the
    first set. Worrying about the second is a waste of finite cognition.
  source: Epictetus, Discourses
  lang: en

- title: Festina lente — make haste slowly
  body: Move with urgency; act with care.  Hurried but careless action loses ground;
    deliberate but slow action loses time. The combination — quick decisions, careful
    execution — is hard but is the actual goal.
  original: Festina lente.
  source: Augustus / Suetonius
  lang: la

- title: Ars longa, vita brevis — craft is long, life is short
  body: The skill you are trying to acquire takes longer to master than the time
    you have.  This is not cause for despair but for prioritisation.  You cannot
    learn everything; choose the craft that will still matter when you are gone, and
    spend the years accordingly.  Wasting time is not a small sin — it is the only
    unrecoverable one.
  original: Vita brevis, ars longa, occasio praeceps, experimentum periculosum, iudicium difficile.
  source: Seneca, De Brevitate Vitae (after Hippocrates)
  lang: la

- title: Omnia aliena sunt, tempus tantum nostrum est
  body: Everything else — money, status, reputation, health — can be taken from
    you at any moment.  Time is the one possession that is wholly yours while you
    hold it, and it runs whether you use it or not.  Seneca's first letter to Lucilius
    opens on this note precisely because it is the premise on which everything else
    depends.  Protect your time before you protect anything else.
  original: Omnia, Lucili, aliena sunt, tempus tantum nostrum est.
  source: Seneca, Epistulae Morales I
  lang: la

- title: Nusquam est qui ubique est — to be everywhere is to be nowhere
  body: Spreading attention across too many problems, projects, or places is not
    productivity — it is dispersal.  The restless mind that cannot settle produces
    shallow work and shallow relationships.  Depth requires staying.  Pick the thing,
    and stay with it long enough for something to happen.
  original: Nusquam est, qui ubique est.
  source: Seneca, Epistulae Morales II
  lang: la

- title: Premeditatio malorum — rehearse what can go wrong
  body: Before a plan, a conversation, or a journey, briefly and deliberately imagine
    the ways it can fail.  Not to catastrophise, but to reduce the sting of surprise
    and to verify that you can still act well if it does.  The exercise distinguishes
    catastrophising (involuntary, future-focused, amplifies anxiety) from premeditation
    (intentional, present-focused, reduces it).  Seneca, Marcus Aurelius, and Epictetus
    all practised versions of this.
  original: Premeditatio malorum.
  source: Seneca, Epistulae Morales; Marcus Aurelius, Meditations
  lang: la

- title: Impedimentum in viam — the obstacle is the way
  body: When the path is blocked, the block itself becomes the path.  The resistance
    you face is not separate from the work — it is the work.  Marcus Aurelius wrote
    that what impedes action advances action, meaning that confronting an obstacle
    directly trains exactly the capacity needed to move past it.  Circumvention is
    tempting but usually only defers the lesson.
  original: The impediment to action advances action. What stands in the way becomes the way.
  source: Marcus Aurelius, Meditations V.20
  lang: la

- title: Sustine et abstine — bear and forbear
  body: Two words that cover most of Stoic practice.  Sustine — endure discomfort,
    difficulty, and what cannot be changed.  Abstine — renounce what the situation
    does not allow, what you desire but should not pursue.  Endurance without renunciation
    is stubbornness; renunciation without endurance is fragility.  The pairing is the
    whole discipline.
  original: Sustine et abstine.
  source: Epictetus, Fragments 10
  lang: la

- title: Summum bonum — the highest good
  body: The Stoics held that virtue is the only true good — not wealth, health,
    reputation, or pleasure, which are merely preferred indifferents.  Cicero gave
    the idea its Latin label.  The practical consequence is clarifying under pressure —
    if the only thing that can be lost is virtue, and virtue is yours alone to keep
    or surrender, then no external event can truly harm you.  Everything else is
    negotiable.
  original: Summum bonum.
  source: Cicero; Marcus Aurelius, Meditations
  lang: la

- title: The view from above
  body: Step out of the immediate scene and see yourself from altitude — city, continent,
    planet, cosmos.  Marcus Aurelius returned to this exercise repeatedly in the
    Meditations.  From sufficient distance, the quarrel, the embarrassment, the
    ambition all shrink toward their actual proportion.  The exercise does not make
    problems disappear; it makes them correctly sized, which is the prerequisite
    for responding calmly rather than reactively.
  original: Think of substance in its entirety, of which you have the smallest of
    shares; and of time in its entirety, of which a brief and momentary span has
    been assigned to you.
  source: Marcus Aurelius, Meditations V.24
  lang: en

- title: Sympatheia — the web holds
  body: Everything is connected.  What you do ripples outward; what happens elsewhere
    eventually reaches you.  The Stoics called this sympatheia — the mutual interdependence
    of all things in the cosmos.  The practical implication is not mysticism but
    responsibility — isolating yourself from a problem does not end your relationship
    to it.  Act as a part of the whole, not as a spectator of it.
  original: Sympatheia (συμπάθεια).
  source: Marcus Aurelius, Meditations; Epictetus, Discourses
  lang: el

- title: Noli foras ire — do not go outside yourself
  body: The source of disturbance is almost never the external event.  It is the
    judgement you make about the event.  Before seeking a solution in the world —
    a different job, a different city, a different set of people — verify that the
    problem is not travelling with you.  Seneca warned that the restless person who
    changes location repeatedly is demonstrating a sick soul, not a sense of adventure.
  original: Noli foras ire; in te ipsum redi.
  source: Augustine (after Seneca); Seneca, Epistulae Morales II
  lang: la

- title: Don't explain your philosophy — embody it
  body: Talk about virtue is cheap and often counter-productive.  The Stoics were
    suspicious of philosophers who lectured at dinner parties about how one ought
    to eat, while eating badly.  Epictetus put it plainly — never call yourself a
    philosopher among the unlearned.  Show the actions that have been produced by
    digested principles, not the theorems themselves.  The proof of understanding
    is behaviour, not articulation.
  original: "μὴ λέγε ὅτι φιλόσοφος εἶ."
  source: Epictetus, Enchiridion 46
  lang: en

- title: We suffer more in imagination than in reality
  body: Most of the things we dread happen less often than we fear, less severely
    than we picture, and pass faster than we anticipate.  The cost is paid in
    advance, in the anticipation, and a second time if the event arrives — so
    the imaginative coward pays twice for what the brave pay once for.
    Premeditation of evils is useful; chronic dread is debt with no asset.
  original: "Plura sunt, Lucili, quae nos terrent quam quae premunt, et saepius opinione quam re laboramus."
  source: Seneca, Letters 13.4
  lang: en

- title: It is not what happens to you
  body: Two people receive the same news; one is destroyed, the other adapts.
    The event is identical; the response is not.  What lies between event and
    response is judgement, and judgement is yours.  This is the entire
    Stoic claim about agency in one line — not that the world bends to you
    but that the meaning you give events is not delivered with them.
  original: "Οὐ τὰ πράγματα ταράσσει τοὺς ἀνθρώπους, ἀλλὰ τὰ περὶ τῶν πραγμάτων δόγματα."
  source: Epictetus, Enchiridion 5
  lang: en

- title: The best revenge is to be unlike him
  body: Returning injury escalates and ties you to the injurer; living well in
    a way that makes their behaviour pointless to you is the only revenge
    that compounds.  Marcus, surrounded by court intriguers, did not write
    that the wronged should suffer in silence — he wrote that vengeance is
    a poor use of finite time, and that the better answer is to deny the
    offence its grip on your character.
  original: "Ἄριστος τρόπος τοῦ ἀμύνεσθαι τὸ μὴ ἐξομοιοῦσθαι."
  source: Marcus Aurelius, Meditations 6.6
  lang: en

- title: Wish that everything happens as it does
  body: Don't demand that events conform to your preferences; instead train
    your preferences toward what is actually happening.  This is not
    fatalism — you still act — but it dissolves the perpetual gap between
    wished-for-reality and actual-reality that is the source of most
    suffering.  Pair with appropriate action and the result is equanimity,
    not passivity.
  original: "Μὴ ζήτει τὰ γινόμενα γίνεσθαι ὡς θέλεις, ἀλλὰ θέλε τὰ γινόμενα ὡς γίνεται, καὶ εὐροήσεις."
  source: Epictetus, Enchiridion 8
  lang: en

- title: You have power over your mind
  body: External circumstances are not under your power, but your interpretation
    of them is.  Realising this — not as a slogan but as a habit — is the
    point at which a great deal of unnecessary suffering ends.  Marcus
    returns to it more than any other theme — the citadel of the mind, the
    one place that cannot be overrun unless you open the gates.
  original: "Τοῦ νοῦ ἐξουσίαν ἔχεις, οὐχὶ τῶν ἔξω. Τοῦτο διαγνοὺς ἰσχύσεις."
  source: Marcus Aurelius, Meditations 12.22
  lang: en

- title: A short life is long enough
  body: The complaint that life is too short is usually a complaint that we
    have not lived attentively; a properly lived life of fifty years
    contains more than a distracted life of ninety.  Seneca's argument is
    not that we should compress activity but that we should stop renting
    out our days — to busy-work, to other people's agendas, to the future.
    The years are spent either way; the question is by whom.
  original: "Non exiguum temporis habemus, sed multum perdimus."
  source: Seneca, De Brevitate Vitae 1.3
  lang: en

- title: Waste no more time arguing what a good man should be
  body: Endless debate about what virtue requires is itself a sophisticated
    avoidance of practising it.  At some point the argument has produced
    enough clarity to act on; further refinement is a cover for inaction.
    Marcus, an emperor and not a professor, repeatedly reminds himself
    that philosophy is read for the conduct it produces, not the
    distinctions it sharpens.
  original: "Μηκέτι περὶ τοῦ οἷόν τινα εἶναι τὸν ἀγαθὸν ἄνδρα διαλέγου, ἀλλὰ γίνου τοιοῦτος."
  source: Marcus Aurelius, Meditations 10.16
  lang: en