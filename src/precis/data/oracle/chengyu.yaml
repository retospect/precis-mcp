slug: chengyu
title: Chengyu
description: Chinese four-character idioms.  Compact archetypes with deep embedded
  narratives — each idiom names a recurring strategic situation.
tags:
- chengyu
entries:
- title: Morning three, evening four
  body: Names and labels can change without the underlying quantity changing.  When
    you reframe a deal so the parts seem more favourable, you've changed how it
    feels, not what it is. Beware reframing that masquerades as concession.
  original: 朝三暮四
  pinyin: zhāo sān mù sì
  lang: zh

- title: Drawing legs on a snake
  body: Adding superfluous detail beyond the point of usefulness ruins the work.  A
    complete-enough thing is better than an "improved" version that no longer fits.  Stop
    when you're done.
  original: 畫蛇添足
  pinyin: huà shé tiān zú
  lang: zh

- title: Lord Ye loves dragons
  body: Professed love of a thing collapses on contact with the real thing.  When
    you build for an imagined user (or self), check what happens when the actual
    one shows up.  Stated preferences and revealed preferences diverge.
  original: 葉公好龍
  pinyin: yè gōng hào lóng
  lang: zh

- title: Watching the stump for the rabbit
  body: One lucky outcome doesn't make a strategy.  If a rabbit ran into a stump
    and broke its neck, sitting by the stump waiting for another rabbit is not a
    plan.  Look for repeatable mechanisms, not single observations.
  original: 守株待兔
  pinyin: shǒu zhū dài tù
  lang: zh

- title: The fox borrows the tiger's might
  body: Borrowed authority looks identical to real authority — until the lender
    steps away.  When deference flows from your affiliation, treat it as a loan,
    not an asset.  Plan for the day the affiliation ends.
  original: 狐假虎威
  pinyin: hú jiǎ hǔ wēi
  lang: zh

- title: Add eyes to the dragon
  body: The last small detail is the one that makes the work alive. A presentation
    with no opening hook, an essay with no closer, a product with no name — each
    is technically complete and yet inert.  Find the missing eye.
  original: 畫龍點睛
  pinyin: huà lóng diǎn jīng
  lang: zh

- title: Snipe and clam fight; fisherman wins
  body: Two opponents locked in a stalemate hand the prize to a third party who
    shows up later.  When two of you are stuck refusing to concede, ask who benefits
    from the prolonged fight.
  original: 鷸蚌相爭
  pinyin: yù bàng xiāng zhēng
  lang: zh

- title: Forced up Mount Liang
  body: Sometimes the only path to a useful position is one nobody would willingly
    choose.  When you find yourself committed to a course you didn't pick, look
    for what becomes possible from this new vantage point — fighting the decision
    is wasted.
  original: 逼上梁山
  pinyin: bī shàng liáng shān
  lang: zh

- title: The foolish old man moves the mountain
  body: Multi-generational compounding effort beats one-generation heroics.  If
    the work is large enough that you cannot finish it, set up something the next
    person can continue, and don't pretend the project will be done in your lifetime.
  original: 愚公移山
  pinyin: yú gōng yí shān
  lang: zh

- title: Like a fish back in water
  body: Some pairings — person and role, system and load — only make sense once
    they're matched.  Before judging output, check the environment.  Performance
    is a property of the fit, not just the actor.
  original: 如魚得水
  pinyin: rú yú dé shuǐ
  lang: zh

- title: Smash the pots and sink the boats
  body: Burn the retreat.  When commitment matters more than option preservation,
    removing the option to retreat focuses everyone on the only path forward.  Use
    sparingly — most of the time, retaining options is the right move.
  original: 破釜沉舟
  pinyin: pò fǔ chén zhōu
  lang: zh

- title: Pulling up shoots to help them grow
  body: Visible progress is not the same as actual progress.  Yanking seedlings
    to make them taller faster kills them; pushing a team to ship before the work
    is ready degrades the work and the team.  Patience is a yield function.
  original: 拔苗助長
  pinyin: bá miáo zhù zhǎng
  lang: zh

- title: Riding a tiger, hard to dismount
  body: Some commitments are easier to enter than to exit.  Once you are on the
    tiger's back you cannot stop and you cannot step off — the danger of dismounting
    exceeds the danger of riding.  Before you climb on, ask whether you can afford
    to stay on indefinitely, because that may be what you're agreeing to.
  original: 騎虎難下
  pinyin: qí hǔ nán xià
  lang: zh

- title: Sleep on firewood, taste the gall
  body: Voluntary discomfort as a memory device.  King Goujian, enslaved after
    defeat, slept on brushwood and licked bile each morning so that humiliation
    never faded into comfort.  When a long-horizon goal requires you not to forget
    what is at stake, build in a daily reminder sharp enough to actually sting.
  original: 臥薪嘗膽
  pinyin: wò xīn cháng dǎn
  lang: zh

- title: The frog at the bottom of the well
  body: The frog reports accurately on everything it can see — a circle of sky,
    some damp walls, a few insects.  Its error is not lying but failing to know
    the limits of its sample.  Confident, local expertise does not scale to a
    world it has never encountered.  Check whether your map was drawn from inside
    a well.
  original: 井底之蛙
  pinyin: jǐng dǐ zhī wā
  lang: zh

- title: Pointing at a deer, calling it a horse
  body: The minister Zhao Gao presented a deer to the court and called it a horse.
    He watched who agreed, who stayed silent, and who corrected him — then
    eliminated the last group.  The idiom is not about stupidity; it is about a
    loyalty test dressed as a factual claim.  When you are asked to affirm something
    you know to be false, the question being put to you is not about the deer.
  original: 指鹿為馬
  pinyin: zhǐ lù wéi mǎ
  lang: zh

- title: Chu songs from all four sides
  body: Xiang Yu's army, encircled at Gaixia, heard Han soldiers singing the folk
    songs of Chu — his own homeland — from every direction.  He concluded his
    people had already surrendered and his will collapsed before the final battle.
    Psychological encirclement can break a position that physical force could not.
    When every signal reaching you carries the same demoralising message, ask who
    is choosing which signals you receive.
  original: 四面楚歌
  pinyin: sì miàn chǔ gē
  lang: zh

- title: Secretly cross at Chencang
  body: Han Xin made a loud show of repairing the cliff roads — the obvious route
    his enemy was watching — while his real army moved quietly through Chencang.
    The decoy effort must be credible enough to hold attention; the real move must
    stay invisible until it is complete.  Noise and action are not the same thing.
  original: 暗度陳倉
  pinyin: àn dù chén cāng
  lang: zh

- title: Remove the firewood from beneath the pot
  body: Reducing the flame is temporary; removing the fuel ends the problem.  When
    a situation keeps reigniting after each intervention, you are managing symptoms.
    Find what is feeding the fire and take that away instead.  This is harder and
    less visible than repeatedly pouring water, which is precisely why it is rarer.
  original: 釜底抽薪
  pinyin: fǔ dǐ chōu xīn
  lang: zh

- title: Advance one step, make camp
  body: Speed without consolidation creates a line that can be cut at any point.
    The Han general's discipline was to secure each position before extending to
    the next — slower in the short run, unassailable over time.  A gain you cannot
    hold is not a gain.
  original: 步步為營
  pinyin: bù bù wéi yíng
  lang: zh

- title: Bamboo already formed in the chest
  body: The Song painter Wen Yuke never touched brush to paper until the finished
    bamboo was fully alive in his mind.  Preparation that is invisible to observers
    is still preparation.  The work that looks effortless is usually the work
    whose effort happened before anyone was watching.
  original: 胸有成竹
  pinyin: xiōng yǒu chéng zhú
  lang: zh

- title: Water dripping pierces stone
  body: A single drop does nothing.  The same drop, landing in the same spot, every
    day for years, eventually bores through granite.  The variable is not force —
    it is consistency and patience accumulated beyond the horizon of anyone watching.
    Most people stop before the hole becomes visible.
  original: 水滴石穿
  pinyin: shuǐ dī shí chuān
  lang: zh

- title: The old man at the border loses his horse
  body: The horse escapes — misfortune.  The horse returns leading a wild stallion
    — fortune.  The son breaks his leg trying to ride it — misfortune.  The army
    conscripts every able-bodied man but exempts the son — fortune.  The chain
    continues without end.  Single-event evaluation of complex systems is almost
    always premature.
  original: 塞翁失馬
  pinyin: sài wēng shī mǎ
  lang: zh

- title: A bird startled by the bowstring
  body: The archer Geng Ying brought down a goose without releasing an arrow —
    the bowstring's sound alone sent the already-wounded bird into a fatal panic.
    A past injury that never healed makes ordinary stimuli dangerous.  In people,
    teams, and systems alike, disproportionate reactions usually point to an old
    wound, not the present trigger.
  original: 驚弓之鳥
  pinyin: jīng gōng zhī niǎo
  lang: zh

- title: Digging a well only when thirsty
  body: The well you need in a crisis takes weeks to dig.  Contingency infrastructure
    — relationships, reserves, documentation, redundancy — has no apparent value
    until the moment it has every value.  The cost of preparation feels abstract;
    the cost of its absence is vivid and immediate.  One is paid in advance, the
    other with interest.
  original: 臨渴掘井
  pinyin: lín kě jué jǐng
  lang: zh

- title: Watching the fire from the opposite bank
  body: Standing safely back while two others' conflict burns is a position, not
    an absence of one.  The observer gains information and conserves resources,
    but also risks being last to move when the smoke clears.  Deliberate
    non-intervention requires knowing how long you can afford to watch.
  original: 隔岸觀火
  pinyin: gé àn guān huǒ
  lang: zh

- title: Half the effort, double the result
  body: Not all inputs convert at the same rate.  Finding the leverage point —
    the action that propagates through a system rather than pushing against it —
    changes the ratio.  Most effort is spent pushing; the rarer skill is finding
    where a small force is already aligned with what the system wants to do anyway.
  original: 事半功倍
  pinyin: shì bàn gōng bèi
  lang: zh

- title: The slow bird must start early
  body: Those without native advantage must compensate through preparation and
    timing.  The slow bird that leaves at dawn reaches the destination beside the
    fast bird that slept in.  Knowing your relative speed is not demoralising —
    it is the correct input for scheduling.
  original: 笨鳥先飛
  pinyin: bèn niǎo xiān fēi
  lang: zh

- title: Rise again from the eastern mountain
  body: Retirement is not permanent defeat.  The statesman Xie An withdrew to the
    eastern mountains, apparently finished — then returned to save the Eastern Jin
    dynasty at Feishui.  The interval was not wasted; it was where the next move
    was prepared.  An exit that preserves optionality is not the same as a loss.
  original: 東山再起
  pinyin: dōng shān zài qǐ
  lang: zh

- title: Carving the boat to find the sword
  body: A man dropped his sword overboard and carved a mark on the boat's rail
    where it fell.  When the boat docked, he dove at the mark.  The sword was
    on the river bottom miles upstream.  A model parameterized on one system
    applied unchanged to another is the mark, not the sword.
  original: 刻舟求剑
  pinyin: kè zhōu qiú jiàn
  lang: zh