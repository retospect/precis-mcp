slug: zen
title: Zen
description: Zen and koan-flavoured aphorisms.  Practice over insight; map versus
  territory; the discipline of beginner's mind.
tags:
- zen
entries:
- title: First, empty your cup
  body: You cannot pour new tea into a full cup.  Before learning something new,
    set down the answer you already have.  Holding both your prior model and the
    new one in suspension is harder than it sounds, but it's the actual work of
    learning.
  lang: en
- title: The finger pointing at the moon is not the moon
  body: Map is not territory.  The metaphor, the diagram, the framework — all are
    pointers.  Don't optimise the pointer; use it to look at what it points to and
    then check whether the thing actually exists in the shape described.
  lang: en
- title: Before enlightenment, chop wood; after, chop wood
  body: The work doesn't change shape with insight.  Your relation to it does.  When
    you find yourself looking for the breakthrough that exempts you from the daily
    grind, the grind is probably the grind regardless — keep chopping.
  lang: en
- title: "In the beginner's mind there are many possibilities; in the expert's, few"
  body: Expertise narrows the search space, which is useful until it isn't.  The
    specialist's instinct is to pattern-match the new problem onto a solved one.
    Beginner's mind is the deliberate refusal to do that — not ignorance, but a
    momentary loosening of the category system so that the thing in front of you
    can be seen on its own terms.
  lang: en
- title: Not knowing is most intimate
  body: The impulse to resolve uncertainty — to name it, box it, file it — is
    usually faster than the situation warrants.  Sitting with a question without
    reaching for the answer keeps you in contact with the actual texture of the
    problem.  Premature closure is comfortable and wrong more often than it feels.
  lang: en
- title: "You do not sit to gain enlightenment; you sit because you are enlightened"
  body: Reframed for practice outside a cushion — don't do the work in order to
    eventually become someone who does the work well.  Do it as the expression of
    someone who already shows up.  The framing changes what you notice when you
    hit friction — obstacle versus data.
  lang: en
- title: "When you walk, just walk; when you sit, just sit; above all, don't wobble"
  body: Divided attention is not a sign of capability; it's a sign of unresolved
    commitment.  Pick the action in front of you and inhabit it.  The wobble —
    half-present, half-somewhere-else — produces neither quality work nor genuine
    rest, just a blurred version of both.
  lang: en
- title: To study the self is to forget the self
  body: Sustained attention on how you are thinking tends to dissolve the thinker
    as a fixed object.  The self that seemed to be doing the observing turns out
    to be constructed fresh each moment from whatever concerns are active.  This
    is not a spiritual claim; it is just what careful introspection reports back.
  lang: en
- title: If you cannot find the truth right where you are, where else do you expect to find it
  body: The search for the ideal conditions — the right project, the right team,
    the right tools — is often a way of deferring the work.  The present situation,
    with its friction and imperfection, is the only actual site of practice.  Ideal
    conditions are a rumour.
  lang: en
- title: The obstacle is the path
  body: Resistance, confusion, and repeated failure are not signs that you have
    taken a wrong turn.  They are the texture of a hard thing being learned.
    The question is not how to get around the difficulty but what the difficulty
    is actually made of — that examination is most of the work.
  lang: en
- title: A koan is not a riddle with a hidden answer
  body: The point of sitting with an unsolvable question is not to eventually
    solve it.  It is to notice what the reasoning mind does when it hits a wall —
    the grasping, the category-shuffling, the frustration — and to keep watching
    anyway.  The watching is the practice; the answer, if one arrives, is a
    by-product.
  lang: en
- title: The mirror does not hold the reflection
  body: Good feedback — from instruments, from colleagues, from metrics — shows
    you the shape of the thing without adding opinion.  The temptation is to argue
    with the mirror.  The mirror has nothing to argue back.  Take the reading,
    adjust, and measure again.
  lang: en
- title: Do not seek the Buddha outside yourself — but do not seek only inside either
  body: Both moves can be evasions.  Pure introspection can become self-absorption
    dressed as depth.  Pure external seeking can become collecting other people's
    maps.  The practice is the alternation — look out, look in, notice the
    difference, repeat.
  lang: en
- title: "Continuous practice, day after day, is the most appropriate way"
  body: Large discontinuous efforts followed by long absences produce less than
    small consistent ones.  This is not motivational advice; it is a description
    of how skills compound and decay.  The daily small action is the unit of
    progress, not the breakthrough session.
  lang: en
- title: The sage does nothing, yet nothing is left undone
  body: Wu wei is not laziness; it is action without the overhead of forcing.
    Most wasted effort comes not from insufficient push but from push applied
    against the grain — trying to make things be other than they are before you
    have understood what they actually are.  Read the situation; then act with it.
  lang: en
- title: The whole moon is reflected in a single dewdrop
  body: Complete information is almost never available; a small true observation
    can still carry the structure of the whole.  The useful question is not
    "do I have enough data?" but "have I looked at what I have with sufficient
    care?"  The dewdrop is enough if you actually look at it.
  lang: en
- title: A flower falls even though we love it; a weed grows even though we do not
  body: The world does not organise itself around your preferences.  Noting this
    without resentment is most of what equanimity means in practice.  You can
    still pull the weed; you just do it as a gardener, not as someone correcting
    a personal affront.
  lang: en
- title: Prefer to be defeated in the presence of the wise than to excel among fools
  body: The environment you practise in sets the ceiling.  Being the most capable
    person in the room is comfortable and stops teaching you.  Discomfort from
    exposure to people who are clearly better at something is the gradient signal;
    follow it.
  lang: en
  