# Dream PROCESS lenses — multi-phase passes for the dream cycle.
#
# Home for the Part-B "lens seed" of
# docs/design/tool-friction-reflection-and-dreams.md. The single-stance
# PERSONA lenses (Feynman, Einstein, Shannon, Napoleon, …) moved out of
# this file into first-class oracle traditions — `data/oracle/{scientists,
# leadership,artists}.yaml` — so the dream and any "consult a mind" call
# share one source, biased via a named lens (see `utils/oracle_lens.py`).
# The dream worker draws a persona stance from the oracle under the `sci`
# lens by default (50% scientists / 50% evenly across the other
# traditions), and occasionally runs one of the PROCESS lenses below
# instead — a `process` is a sequential multi-phase pass, which doesn't
# fit the oracle's one-block-per-entry "random wisdom" shape.
#
# `axes` is the human-readable summary; `prompt` is what gets injected
# into the dream prompt's VARIABLE layer (never the cached system layer).

version: 2

lenses:
  - id: disney
    name: Disney
    kind: process
    axes: >-
      Sequential NLP creativity strategy — Dreamer → Realist → Critic
    prompt: |
      Dream as the Disney creativity strategy — a sequential three-phase
      pass through one connection, holding a different stance in each:

        1. DREAMER — unbounded vision. "What if?" No constraints, no
           feasibility. Let the connection be as large as it wants.
        2. REALIST — make it concrete. "How would this actually work?"
           Turn the vision into a specific mechanism / plan / next step.
        3. CRITIC — find the flaw. "What breaks? What's missing?" Attack
           the realist's plan; name where it fails.

      Move strictly in order and keep the roles separate — never critique
      while dreaming. The memory you write should carry the survivor: the
      vision, its concrete form, and the critique it withstood.
